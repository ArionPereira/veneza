name: Publish site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish dist to gh-pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add publish-dir origin/gh-pages
          find publish-dir -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. publish-dir/
          touch publish-dir/.nojekyll
          cd publish-dir
          git add -A
          git commit -m "Publica módulos operacionais" || exit 0
          git push origin HEAD:gh-pages
